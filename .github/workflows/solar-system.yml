  build:
    name: Docker build and push
    runs-on: ubuntu-latest
    outputs:
      k8s-image: ${{ steps.docker-image.outputs.docker-image }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build the docker image
        uses: docker/build-push-action@v7
        with:
          push: false
          context: .
          load: true
          tags: ${{vars.DOCKERHUB_USERNAME}}/solar-system:${{github.sha}}
      - name: Test the docker build
        run: |
          docker run --rm -d --name solar-system-app \
          -p 3000:3000 \
          -e MONGO_USERNAME=${{env.MONGO_USERNAME}} \
          -e MONGO_PASSWORD=${{env.MONGO_PASSWORD}} \
          -e MONGO_URI=${{env.MONGO_URI}} \
          ${{vars.DOCKERHUB_USERNAME}}/solar-system:${{github.sha}}

          echo "Testing /live endpoint"
          wget -q -O - http://127.0.0.1:3000/live | grep live
      - name: Push the docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          tags: ${{vars.DOCKERHUB_USERNAME}}/solar-system:${{github.sha}}
      - name: Output docker image
        id: docker-image
        run: echo "docker-image=${{vars.DOCKERHUB_USERNAME}}/solar-system:${{github.sha}}" >> "$GITHUB_OUTPUT"

  deploy-dev:
    name: Dev Deployment on eks
    if: contains(github.ref, 'feature/')
    needs: build
    uses: ./.github/workflows/reusable-deploy-workflow.yml
    with:
      k8s-image: ${{ needs.build.outputs.k8s-image }}
      mongo-uri: ${{ vars.MONGO_URI }}
      mongo-username: ${{ vars.MONGO_USERNAME }}
      environment: development
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-access-secret-key: ${{ secrets.AWS_ACCESS_KEY_ID }}
      mongo-password: ${{ secrets.MONGO_PASSWORD }}

  dev-integration-testing:
    name: Development Integration Testing
    needs: deploy-dev
    uses: ./.github/workflows/reusable-integration-testing.yml
    with:
      app-ingress-url: ${{ needs.deploy-dev.outputs.app-ingress-url }}
      environment: development

  deploy-prod:
    name: Prod Deployment on eks
    if: github.ref == 'refs/heads/main'
    needs: build
    uses: ./.github/workflows/reusable-deploy-workflow.yml
    with:
      environment: production
      k8s-image: ${{ needs.build.outputs.k8s-image }}
      mongo-uri: ${{ vars.MONGO_URI }}
      mongo-username: ${{ vars.MONGO_USERNAME }}
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-access-secret-key: ${{ secrets.AWS_ACCESS_KEY_ID }}
      mongo-password: ${{ secrets.MONGO_PASSWORD }}

  prod-integration-testing:
    name: Development Integration Testing
    needs: deploy-prod
    uses: ./.github/workflows/reusable-integration-testing.yml
    with:
      app-ingress-url: ${{ needs.deploy-prod.outputs.app-ingress-url }}
      environment: production
